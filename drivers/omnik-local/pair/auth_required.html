<base target="_parent"/>

<div class="form-wrapper">
    <p class="alert info" data-i18n="pair.omnik-local.auth_explainer">
        The inverter's web interface requires authentication. Default credentials are usually <code>admin</code> / <code>admin</code>, unless your installer changed them.
    </p>

    <form class="homey-form">
        <fieldset class="homey-form-fieldset">
            <div class="homey-form-group">
                <label class="homey-form-label" for="auth_user" data-i18n="pair.omnik-local.auth_user">Username</label>
                <input class="homey-form-input"
                       id="auth_user"
                       type="text"
                       autocomplete="username"
                       value="admin"/>
            </div>
            <div class="homey-form-group">
                <label class="homey-form-label" for="auth_password" data-i18n="pair.omnik-local.auth_password">Password</label>
                <input class="homey-form-input"
                       id="auth_password"
                       type="password"
                       autocomplete="current-password"
                       value="admin"/>
            </div>
        </fieldset>
    </form>

    <div class="actions">
        <button class="homey-button-primary-full" id="submit-auth" data-i18n="pair.omnik-local.auth_submit">Continue</button>
    </div>
</div>

<script type="application/javascript">
    Homey.setTitle(Homey.__("pair.omnik-local.auth_title"));

    Homey.on("alert", function (message) {
        Homey.alert(message);
    });

    document.getElementById("submit-auth").addEventListener("click", function () {
        const user = document.getElementById("auth_user").value;
        const password = document.getElementById("auth_password").value;
        Homey.emit("submitAuth", { user, password });
    });
</script>

<style type="text/css">
    .form-wrapper {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
    }

    .alert {
        padding: 0.75rem 1rem;
        border-radius: 0.25rem;
        font-size: 0.875rem;
    }

    .info {
        color: #004085;
        background-color: #cce5ff;
        border-color: #b8daff;
    }

    .actions {
        margin-top: auto;
        padding-top: 1rem;
    }

    code {
        background-color: rgba(0, 0, 0, 0.08);
        padding: 0 0.25rem;
        border-radius: 0.125rem;
    }
</style>
